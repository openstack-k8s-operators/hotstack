# Metal3 BareMetalHost CRD stub for MicroShift compatibility
# TODO(hjensas): This is a minimal stub CRD to prevent the openstack-baremetal-operator
# from crashlooping. For actual baremetal provisioning, install the full Metal3
# baremetal-operator which includes complete CRD definitions and the operator itself.
# Source: https://github.com/metal3-io/baremetal-operator
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: baremetalhosts.metal3.io
spec:
  group: metal3.io
  names:
    kind: BareMetalHost
    listKind: BareMetalHostList
    plural: baremetalhosts
    shortNames:
    - bmh
    - bmhost
    singular: baremetalhost
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            x-kubernetes-preserve-unknown-fields: true
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
