- name: Restart CRI-O to pick up configuration changes
  delegate_to: "{{ microshift_host }}"
  become: true
  ansible.builtin.systemd:
    name: crio
    state: restarted

- name: Enable and restart MicroShift service
  delegate_to: "{{ microshift_host }}"
  become: true
  ansible.builtin.systemd:
    name: microshift
    enabled: true
    state: restarted

- name: Ensure .kube directory exists on MicroShift node
  delegate_to: "{{ microshift_host }}"
  become: true
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: '0755'

- name: Create kubeconfig symlink on MicroShift node
  delegate_to: "{{ microshift_host }}"
  become: true
  ansible.builtin.file:
    src: /var/lib/microshift/resources/kubeadmin/kubeconfig
    dest: /root/.kube/config
    state: link
    force: true
