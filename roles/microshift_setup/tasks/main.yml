- name: Skip MicroShift setup for OCP
  when: ocp_installer_type != 'microshift'
  ansible.builtin.debug:
    msg: "Skipping MicroShift setup - ocp_installer_type is {{ ocp_installer_type }}"

- name: MicroShift setup
  when: ocp_installer_type == 'microshift'
  block:
    - name: Write pull secret to MicroShift node
      when: pull_secret | length > 0
      delegate_to: "{{ microshift_host }}"
      become: true
      ansible.builtin.copy:
        content: "{{ pull_secret | b64decode }}"
        dest: /etc/crio/openshift-pull-secret
        owner: root
        group: root
        mode: '0600'

    - name: Ensure directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ bin_dir }}"
        - "{{ microshift_kube_config_dir }}"

    - name: Install OpenShift client
      ansible.builtin.include_tasks: install_client.yml

    # Configuration files and manifests are now baked into the DIB image
    # - name: Deploy MicroShift configurations and manifests
    #   ansible.builtin.include_tasks: deploy_manifests.yml

    - name: Start MicroShift service
      ansible.builtin.include_tasks: start_microshift.yml

    - name: Wait for MicroShift and fetch kubeconfig
      ansible.builtin.include_tasks: fetch_kubeconfig.yml

    - name: Wait for MicroShift cluster to be ready
      ansible.builtin.include_tasks: wait_for_ready.yml

    - name: Add MicroShift CA to trust
      when: microshift_add_ca_to_trust | bool
      ansible.builtin.include_tasks: ca_cert.yml
