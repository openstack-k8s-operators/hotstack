- name: Deploy MicroShift manifests
  delegate_to: "{{ microshift_host }}"
  become: true
  block:
    - name: Deploy FRR CRDs manifests
      when: microshift_deploy_frr_crds | bool
      ansible.builtin.copy:
        src: etc/microshift/manifests.d/011-frr-crds/
        dest: /etc/microshift/manifests.d/011-frr-crds/
        owner: root
        group: root
        mode: '0644'

    - name: Deploy Metal3 CRDs manifests
      when: microshift_deploy_metal3_crds | bool
      ansible.builtin.copy:
        src: etc/microshift/manifests.d/012-metal3-crds/
        dest: /etc/microshift/manifests.d/012-metal3-crds/
        owner: root
        group: root
        mode: '0644'
