- name: Assert config is defined
  ansible.builtin.assert:
    that:
      - pull_secret is defined
      - pull_secret | length > 0

- name: Install using agent installer
  when: not ocp_agent_installer_revive_snapshot
  ansible.builtin.include_tasks: _install.yml

- name: Revive OCP snapshot
  when: ocp_agent_installer_revive_snapshot
  ansible.builtin.include_tasks: _revive.yml
