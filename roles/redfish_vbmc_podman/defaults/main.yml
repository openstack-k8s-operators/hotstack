# OpenStack cloud configuration
redfish_vbmc_podman_os_cloud: default
redfish_vbmc_podman_cloud_config_dir: "/home/zuul/.hotcloud"

# Authentication
redfish_vbmc_podman_username: admin
redfish_vbmc_podman_password: password

# Instance filtering
redfish_vbmc_podman_instances_uuids: []

# Container configuration
redfish_vbmc_podman_image: quay.io/rhn_gps_hjensas/sushy-tools:dev-1773400388
redfish_vbmc_podman_listen_port: 8000

# Paths
redfish_vbmc_podman_config_dir: /etc/sushy-emulator
redfish_vbmc_podman_openstack_config_dir: /etc/openstack
redfish_vbmc_podman_state_dir: /var/lib/sushy-emulator

# Sushy-emulator configuration options
redfish_vbmc_podman_debug: true
redfish_vbmc_podman_vmedia_file_upload: true
redfish_vbmc_podman_vmedia_delay_eject: true
redfish_vbmc_podman_ignore_boot_device: false
# Override disk format for virtual media images. Use when OpenStack cloud
# restricts Glance disk formats (e.g., only 'raw' and 'qcow2' allowed).
# Leave undefined to use auto-detected format. Set to 'raw' if cloud rejects
# 'iso' format images.
redfish_vbmc_podman_os_vmedia_disk_format_override: null

# Rescue-based virtual media (SUSHY_EMULATOR_OS_VMEDIA_USE_RESCUE)
# Enable virtual media (CD/DVD) boot via Nova rescue mode. This provides an
# alternative to volume-based virtual media for environments where OpenStack
# cloud lacks Nova API microversion 2.93 (Zed+) or OVMF firmware has issues
# with volume-backed CD-ROM attachment. Mutually exclusive with volume-based
# virtual media implementation.
redfish_vbmc_podman_os_vmedia_use_rescue: false
# Rescue device bus type (default: 'sata'). Use 'scsi' if instances enter
# RESCUE state but don't boot from CD-ROM, as different OVMF UEFI firmware
# implementations may require specific bus types for bootable ISOs.
redfish_vbmc_podman_os_vmedia_rescue_bus: scsi
# Rescue device type for virtual media (default: 'cdrom')
redfish_vbmc_podman_os_vmedia_rescue_device: cdrom

# Rescue-based PXE boot (SUSHY_EMULATOR_OS_RESCUE_PXE_BOOT)
# When enabled, sushy-emulator uses Nova rescue mode for network boot instead
# of the legacy libvirt metadata approach. Set to true when ironic_boot_interface
# is 'pxe' or 'ipxe'. Requires iPXE rescue images in Glance.
redfish_vbmc_podman_os_rescue_pxe_boot: false
redfish_vbmc_podman_os_rescue_pxe_image_bios: ipxe-rescue-bios
redfish_vbmc_podman_os_rescue_pxe_image_uefi: ipxe-rescue-uefi
