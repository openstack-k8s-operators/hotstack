---
heat_template_version: rocky

description: >
  Heat template for MicroShift scenario: 1x Controller, 1x MicroShift

parameters:
  dns_servers:
    type: comma_delimited_list
    default:
      - 8.8.8.8
      - 8.8.4.4
  ntp_servers:
    type: comma_delimited_list
    default: []
  controller_ssh_pub_key:
    type: string
  dataplane_ssh_pub_key:
    type: string
    default: ""
  router_external_network:
    type: string
    default: public
  floating_ip_network:
    type: string
    default: public
  net_value_specs:
    type: json
    default: {}

  controller_params:
    type: json
    default:
      image: hotstack-controller
      flavor: hotstack.small
  nat64_appliance_params:
    type: json
    default:
      image: nat64-appliance
      flavor: hotstack.small
  ocp_master_params:
    type: json
    default:
      image: ipxe-boot-usb
      flavor: hotstack.xxlarge
  ocp_worker_params:
    type: json
    default:
      image: ipxe-boot-usb
      flavor: hotstack.xxlarge
  compute_params:
    type: json
    default:
      image: CentOS-Stream-GenericCloud-9
      flavor: hotstack.large
  networker_params:
    type: json
    default:
      image: CentOS-Stream-GenericCloud-9
      flavor: hotstack.small
  bmh_params:
    type: json
    default:
      image: CentOS-Stream-GenericCloud-9
      cd_image: sushy-tools-blank-image
      flavor: hotstack.medium
  ironic_params:
    type: json
    default:
      image: CentOS-Stream-GenericCloud-9
      cd_image: sushy-tools-blank-image
      flavor: hotstack.medium
  cdrom_disk_bus:
    type: string
    description: >
      Disk bus type for CDROM device. 'sata' may be required for older versions
      of OpenStack. Heat patch https://review.opendev.org/c/openstack/heat/+/966688
      is needed for 'sata' support.
    default: scsi
    constraints:
      - allowed_values:
          - sata
          - scsi
  microshift_params:
    type: json
    default:
      image: hotstack-microshift
      flavor: hotstack.xlarge

resources:
  #
  # Networks
  #
  machine-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  ctlplane-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  internal-api-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  storage-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  tenant-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  ironic-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  #
  # Subnets
  #
  machine-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: machine-net}
      ip_version: 4
      cidr: 192.168.32.0/24
      enable_dhcp: true
      dns_nameservers:
        - 192.168.32.254

  ctlplane-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: ctlplane-net}
      ip_version: 4
      cidr: 192.168.122.0/24
      enable_dhcp: false
      allocation_pools:
        - start: 192.168.122.100
          end: 192.168.122.150
      dns_nameservers:
        - 192.168.122.80

  internal-api-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: internal-api-net}
      ip_version: 4
      cidr: 172.17.0.0/24
      enable_dhcp: false
      allocation_pools:
        - start: 172.17.0.100
          end: 172.17.0.150

  storage-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: storage-net}
      ip_version: 4
      cidr: 172.18.0.0/24
      enable_dhcp: false
      allocation_pools:
        - start: 172.18.0.100
          end: 172.18.0.150

  tenant-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: tenant-net}
      ip_version: 4
      cidr: 172.19.0.0/24
      enable_dhcp: false
      allocation_pools:
        - start: 172.19.0.100
          end: 172.19.0.150

  ironic-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: ironic-net}
      ip_version: 4
      cidr: 172.20.1.0/24
      enable_dhcp: false
      allocation_pools: [{start: 172.20.1.100, end: 172.20.1.150}]

  #
  # Routers
  #
  router:
    type: OS::Neutron::Router
    properties:
      admin_state_up: true
      external_gateway_info:
        network: {get_param: router_external_network}

  machine-net-router-interface:
    type: OS::Neutron::RouterInterface
    properties:
      router: {get_resource: router}
      subnet: {get_resource: machine-subnet}

  ctlplane-net-router-interface:
    type: OS::Neutron::RouterInterface
    properties:
      router: {get_resource: router}
      subnet: {get_resource: ctlplane-subnet}

  ironic-net-router-interface:
    type: OS::Neutron::RouterInterface
    properties:
      router: {get_resource: router}
      subnet: {get_resource: ironic-subnet}

  #
  # Controller
  #
  controller_users:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        users:
          - default
          - name: zuul
            gecos: "Zuul user"
            sudo: ALL=(ALL) NOPASSWD:ALL
            ssh_authorized_keys:
              - {get_param: controller_ssh_pub_key}

  controller-write-files:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        write_files:
          - path: /etc/dnsmasq.conf
            content: |
              # dnsmasq service config
              # Include all files in /etc/dnsmasq.d except RPM backup files
              conf-dir=/etc/dnsmasq.d,.rpmnew,.rpmsave,.rpmorig
              no-resolv
            owner: root:dnsmasq
          - path: /etc/dnsmasq.d/forwarders.conf
            content:
              str_replace:
                template: |
                  # DNS forwarders records
                  server=$dns1
                  server=$dns2
                params:
                  $dns1: {get_param: [dns_servers, 0]}
                  $dns2: {get_param: [dns_servers, 1]}
            owner: root:dnsmasq
          - path: /etc/dnsmasq.d/host_records.conf
            content:
              str_replace:
                template: |
                  # Host records
                  host-record=controller-0.openstack.lab,$controller0
                  host-record=microshift-0.shift.openstack.lab,$microshift0
                params:
                  $controller0: {get_attr: [controller-machine-port, fixed_ips, 0, ip_address]}
                  $microshift0: {get_attr: [microshift0-machine-port, fixed_ips, 0, ip_address]}
            owner: root:dnsmasq
          - path: /etc/dnsmasq.d/wildcard_records.conf
            content:
              str_replace:
                template: |
                  # Wildcard records
                  address=/apps.shift.openstack.lab/$addr
                params:
                  $addr: {get_attr: [controller-machine-port, fixed_ips, 0, ip_address]}
            owner: root:dnsmasq
          - path: /etc/resolv.conf
            content: |
              nameserver: 127.0.0.1
            owner: root:root
          - path: /etc/NetworkManager/conf.d/98-rc-manager.conf
            content: |
              [main]
              rc-manager=unmanaged
            owner: root:root
          - path: /etc/haproxy/haproxy.cfg
            content: |
              global
                log         127.0.0.1 local2
                pidfile     /var/run/haproxy.pid
                maxconn     4000
                daemon
              defaults
                mode                    http
                log                     global
                option                  dontlognull
                option                  http-server-close
                option                  redispatch
                retries                 3
                timeout http-request    10s
                timeout queue           1m
                timeout connect         10s
                timeout client          1m
                timeout server          1m
                timeout http-keep-alive 10s
                timeout check           10s
                maxconn                 3000
              listen api-server-6443
                bind *:6443
                mode tcp
                server microshift-0 microshift-0.shift.openstack.lab:6443 check inter 1s
              listen ingress-router-443
                bind *:443
                mode tcp
                balance source
                server microshift-0 microshift-0.shift.openstack.lab:443 check inter 1s
              listen ingress-router-80
                bind *:80
                mode tcp
                balance source
                server microshift-0 microshift-0.shift.openstack.lab:80 check inter 1s
            owner: root:root

  controller-runcmd:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        runcmd:
          - ['systemctl', 'enable', 'dnsmasq.service']
          - ['systemctl', 'start', 'dnsmasq.service']
          - ['setenforce', 'permissive']
          - ['systemctl', 'enable', 'haproxy.service']
          - ['systemctl', 'start', 'haproxy.service']

  controller-init:
    type: OS::Heat::MultipartMime
    properties:
      parts:
        - config: {get_resource: controller_users}
        - config: {get_resource: controller-write-files}
        - config: {get_resource: controller-runcmd}

  controller-machine-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      mac_address: "fa:16:9e:81:f6:05"
      fixed_ips:
        - ip_address: 192.168.32.254

  controller-floating-ip:
    depends_on: machine-net-router-interface
    type: OS::Neutron::FloatingIP
    properties:
      floating_network: {get_param: floating_ip_network}
      port_id: {get_resource: controller-machine-port}

  controller:
    type: OS::Nova::Server
    properties:
      image: {get_param: [controller_params, image]}
      flavor: {get_param: [controller_params, flavor]}
      networks:
        - port: {get_resource: controller-machine-port}
      user_data_format: RAW
      user_data: {get_resource: controller-init}

  #
  # MicroShift
  #
  microshift0-machine-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      port_security_enabled: false
      mac_address: "fa:16:9e:81:f6:10"
      fixed_ips:
        - ip_address: 192.168.32.10

  microshift0-ctlplane-trunk-parent-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: ctlplane-net}
      port_security_enabled: false
      fixed_ips:
        - ip_address: 192.168.122.10

  microshift0-internal-api-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: internal-api-net}
      port_security_enabled: false
      fixed_ips:
        - ip_address: 172.17.0.10

  microshift0-storage-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: storage-net}
      port_security_enabled: false
      fixed_ips:
        - ip_address: 172.18.0.10

  microshift0-tenant-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: tenant-net}
      port_security_enabled: false
      fixed_ips:
        - ip_address: 172.19.0.10

  microshift0-ironic-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: ironic-net}
      port_security_enabled: false
      fixed_ips: [{ip_address: 172.20.1.10}]

  microshift0-trunk0:
    type: OS::Neutron::Trunk
    properties:
      port: {get_resource: microshift0-ctlplane-trunk-parent-port}
      sub_ports:
        - port: {get_resource: microshift0-internal-api-port}
          segmentation_id: 20
          segmentation_type: vlan
        - port: {get_resource: microshift0-storage-port}
          segmentation_id: 21
          segmentation_type: vlan
        - port: {get_resource: microshift0-tenant-port}
          segmentation_id: 22
          segmentation_type: vlan

  microshift0-lvms-vol0:
    type: OS::Cinder::Volume
    properties:
      size: 20

  microshift0-cinder-vol0:
    type: OS::Cinder::Volume
    properties:
      size: 20

  microshift0-cinder-vol1:
    type: OS::Cinder::Volume
    properties:
      size: 20

  microshift0-cinder-vol2:
    type: OS::Cinder::Volume
    properties:
      size: 20

  microshift_users:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        users:
          - default
          - name: shift
            gecos: "MicroShift user"
            sudo: ALL=(ALL) NOPASSWD:ALL
            ssh_authorized_keys:
              - {get_param: controller_ssh_pub_key}
              - {get_param: dataplane_ssh_pub_key}

  microshift-hostname:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        fqdn: microshift-0.shift.openstack.lab
        prefer_fqdn_over_hostname: true

  microshift-write-files:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        write_files:
          - path: /etc/microshift/config.yaml
            content: {get_file: files/microshift-config.yaml}
            owner: root:root
          - path: /etc/microshift/manifests.d/002-topolvm-config/kustomization.yaml
            content: {get_file: files/topolvm-kustomization.yaml}
            owner: root:root
          - path: /etc/microshift/manifests.d/002-topolvm-config/configmap.yaml
            content: {get_file: files/topolvm-configmap.yaml}
            owner: root:root
          - path: /etc/microshift/manifests.d/002-topolvm-config/storageclass.yaml
            content: {get_file: files/topolvm-storageclass.yaml}
            owner: root:root
          - path: /etc/microshift/ovn.yaml
            content:
              str_replace:
                template: |
                  # MTU value to be used for the Pods, must be less than or equal
                  # to the MTU of default route interface.
                  mtu: $mtu
                params:
                  $mtu: {get_attr: [machine-net, mtu]}
            owner: root:root

  microshift-runcmd:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        runcmd:
          - ['/usr/sbin/pvcreate', '/dev/vdb', '/dev/vdc', '/dev/vdd', '/dev/vde']
          - ['/usr/sbin/vgcreate', 'microshift', '/dev/vdb']
          - ['/usr/sbin/vgcreate', 'cinder-volumes', '/dev/vdc', '/dev/vdd', '/dev/vde']
          - ['mkdir', '-p', '/root/.kube']
          - ['ln', '-sf', '/var/lib/microshift/resources/kubeadmin/kubeconfig', '/root/.kube/config']
          - ['systemctl', 'enable', '--now', 'microshift']

  microshift-init:
    type: OS::Heat::MultipartMime
    properties:
      parts:
        - config: {get_resource: microshift_users}
        - config: {get_resource: microshift-hostname}
        - config: {get_resource: microshift-write-files}
        - config: {get_resource: microshift-runcmd}

  microshift0:
    type: OS::Nova::Server
    properties:
      image: {get_param: [microshift_params, image]}
      flavor: {get_param: [microshift_params, flavor]}
      block_device_mapping_v2:
        - boot_index: -1
          device_type: disk
          volume_id: {get_resource: microshift0-lvms-vol0}
        - boot_index: -1
          device_type: disk
          volume_id: {get_resource: microshift0-cinder-vol0}
        - boot_index: -1
          device_type: disk
          volume_id: {get_resource: microshift0-cinder-vol1}
        - boot_index: -1
          device_type: disk
          volume_id: {get_resource: microshift0-cinder-vol2}
      networks:
        - port: {get_resource: microshift0-machine-port}
        - port: {get_attr: [microshift0-trunk0, port_id]}
        - port: {get_resource: microshift0-ironic-port}
      user_data_format: RAW
      user_data: {get_resource: microshift-init}


outputs:
  ocp_installer_type:
    description: OpenShift installer type
    value: microshift

  ocp_install_config:
    description: >
      Stub for compatibility with playbooks that derive the ingress domain
      from ocp_install_config.metadata.name and ocp_install_config.baseDomain.
    value:
      metadata:
        name: shift
      baseDomain: openstack.lab

  controller_floating_ip:
    description: Controller Floating IP
    value: {get_attr: [controller-floating-ip, floating_ip_address]}

  network_mtu:
    description: MTU values for all networks
    value:
      machine: {get_attr: [machine-net, mtu]}
      ctlplane: {get_attr: [ctlplane-net, mtu]}
      internal_api: {get_attr: [internal-api-net, mtu]}
      storage: {get_attr: [storage-net, mtu]}
      tenant: {get_attr: [tenant-net, mtu]}
      ironic: {get_attr: [ironic-net, mtu]}

  controller_ansible_host:
    description: >
      Controller ansible host, this struct can be passed to the ansible.builtin.add_host module
    value:
      name: controller-0
      ansible_ssh_user: zuul
      ansible_host: {get_attr: [controller-floating-ip, floating_ip_address]}
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
      groups: controllers

  microshift_ansible_host:
    description: >
      MicroShift ansible host, this struct can be passed to the ansible.builtin.add_host module.
      Uses ProxyJump through the controller for SSH access.
    value:
      name: microshift-0
      ansible_user: shift
      ansible_host: {get_attr: [microshift0-machine-port, fixed_ips, 0, ip_address]}
      ansible_port: 22
      ansible_ssh_common_args:
        str_replace:
          template: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=zuul@$controller_ip'
          params:
            $controller_ip: {get_attr: [controller-floating-ip, floating_ip_address]}
      ansible_ssh_private_key_file: '~/.ssh/id_rsa'
      groups: microshifts

  ansible_inventory:
    description: Ansible inventory
    value:
      all:
        children:
          controllers:
            vars:
          microshifts:
            vars:
      localhosts:
        hosts:
          localhost:
            ansible_connection: local
      controllers:
        hosts:
          controller0:
            ansible_host: {get_attr: [controller-machine-port, fixed_ips, 0, ip_address]}
            ansible_user: zuul
            ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            ansible_ssh_private_key_file: '~/.ssh/id_rsa'
      microshifts:
        hosts:
          microshift0:
            ansible_host: {get_attr: [microshift0-machine-port, fixed_ips, 0, ip_address]}
            ansible_user: shift
            ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            ansible_ssh_private_key_file: '~/.ssh/id_rsa'
