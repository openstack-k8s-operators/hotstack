---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the remote architecture repo (includes upstream network-values)
components:
  - https://github.com/openstack-k8s-operators/architecture/examples/dt/uni01alpha/control-plane?ref=main

# Merge hotstack-specific overrides into the network-values ConfigMap
patchesStrategicMerge:
  - hotstack-network-values.yaml

# Hotstack-specific service values
resources:
  - service-values.yaml
