---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the upstream control-plane configuration from architecture repo
# This includes: dt/uni01alpha component, networking values, and service values
resources:
  - https://github.com/openstack-k8s-operators/architecture/examples/dt/uni01alpha/control-plane?ref=main

# Patch network-values for hotstack-specific configuration
# (interface names, DNS resolver, storage class)
patches:
  - path: hotstack-network-values.yaml
