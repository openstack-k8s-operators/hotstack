---
apiVersion: v1
kind: ConfigMap
metadata:
  name: network-values
  annotations:
    config.kubernetes.io/local-config: "true"

data:
  # Hotstack-specific overrides (different from architecture repo defaults)

  # Interface names (hotstack uses eth1/eth2 vs enp7s0/enp8s0)
  ctlplane:
    iface: eth1
    mtu: 1442

  internalapi:
    base_iface: eth1
    mtu: 1442

  storage:
    base_iface: eth1
    mtu: 1442

  tenant:
    base_iface: eth1
    mtu: 1442

  octavia:
    base_iface: eth1
    mtu: 1442

  ironic:
    base_iface: eth2
    mtu: 1442

  # DNS resolver (hotstack uses 192.168.32.3 vs 192.168.122.1)
  dns-resolver:
    config:
      server:
        - 192.168.32.3
      search: []
    options:
      - key: server
        values:
          - 192.168.32.3

  # Storage class (hotstack uses lvms-local-storage vs local-storage)
  storageClass: lvms-local-storage
