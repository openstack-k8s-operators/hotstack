hostname leaf02.stack.lab
username admin privilege 15 secret admin
service routing protocols model multi-agent
vrf instance MGMT
ip routing
ip routing vrf MGMT
ip name-server vrf MGMT 192.168.32.254
ip route vrf MGMT 0.0.0.0/0 192.168.32.1

interface Management0
   description Management interface
   vrf MGMT
   ip address 192.168.32.114/24

interface Ethernet1
   description Link to Spine01
   no switchport
   mtu 1442
   ip address 10.1.1.14/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0

interface Ethernet2
   description Link to Spine02
   no switchport
   mtu 1442
   ip address 10.1.1.18/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0

interface Ethernet3
   description Ironic0 access port - managed by ML2
   mtu 1442
   spanning-tree portfast
   shutdown

interface Ethernet4
   description Ironic1 access port - managed by ML2
   mtu 1442
   spanning-tree portfast
   shutdown

interface Loopback0
   description Router ID and VTEP Source
   ip address 10.255.255.4/32
   ip ospf area 0.0.0.0

interface Vxlan1
   description VXLAN Tunnel Endpoint
   vxlan source-interface Loopback0
   vxlan udp-port 4789

router ospf 1
   router-id 10.255.255.4
   max-lsa 12000

router bgp 65001
   router-id 10.255.255.4
   neighbor 10.255.255.1 remote-as 65001
   neighbor 10.255.255.1 update-source Loopback0
   neighbor 10.255.255.1 description spine01
   neighbor 10.255.255.1 send-community extended
   neighbor 10.255.255.2 remote-as 65001
   neighbor 10.255.255.2 update-source Loopback0
   neighbor 10.255.255.2 description spine02
   neighbor 10.255.255.2 send-community extended
   address-family evpn
      neighbor 10.255.255.1 activate
      neighbor 10.255.255.2 activate

management api http-commands
   no shutdown
   vrf MGMT
      no shutdown

management api gnmi
   transport grpc default
      vrf MGMT

management api netconf
   transport ssh default
      vrf MGMT

management ssh
   vrf MGMT
      no shutdown

end
