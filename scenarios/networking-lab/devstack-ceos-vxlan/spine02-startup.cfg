hostname spine02.stack.lab
username admin privilege 15 secret admin
service routing protocols model multi-agent
vrf instance MGMT
ip routing
ip routing vrf MGMT
ip name-server vrf MGMT 192.168.32.254
ip route vrf MGMT 0.0.0.0/0 192.168.32.1

interface Management0
   description Management interface
   vrf MGMT
   ip address 192.168.32.112/24

interface Ethernet1
   description Link to Spine01
   no switchport
   mtu 1442
   ip address 10.1.1.2/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0

interface Ethernet2
   description Link to Leaf01
   no switchport
   mtu 1442
   ip address 10.1.1.9/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0

interface Ethernet3
   description Link to Leaf02
   no switchport
   mtu 1442
   ip address 10.1.1.17/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0

interface Loopback0
   description Router ID and VTEP Source
   ip address 10.255.255.2/32
   ip ospf area 0.0.0.0

router ospf 1
   router-id 10.255.255.2
   max-lsa 12000

router bgp 65001
   router-id 10.255.255.2
   neighbor 10.255.255.3 remote-as 65001
   neighbor 10.255.255.3 update-source Loopback0
   neighbor 10.255.255.3 description leaf01
   neighbor 10.255.255.3 route-reflector-client
   neighbor 10.255.255.3 send-community extended
   neighbor 10.255.255.4 remote-as 65001
   neighbor 10.255.255.4 update-source Loopback0
   neighbor 10.255.255.4 description leaf02
   neighbor 10.255.255.4 route-reflector-client
   neighbor 10.255.255.4 send-community extended
   address-family evpn
      neighbor 10.255.255.3 activate
      neighbor 10.255.255.4 activate

management api http-commands
   no shutdown
   vrf MGMT
      no shutdown

management api gnmi
   transport grpc default
      vrf MGMT

management api netconf
   transport ssh default
      vrf MGMT

management ssh
   vrf MGMT
      no shutdown

end
