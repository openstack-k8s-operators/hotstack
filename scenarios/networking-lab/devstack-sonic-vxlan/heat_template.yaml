---
heat_template_version: rocky

description: >
  Heat template for networking lab with spine-and-leaf SONiC setup.
  Includes 4 switches (spine01, spine02, leaf01, leaf02), 1 devstack node, and 2 ironic nodes.

parameters:
  dns_servers:
    type: comma_delimited_list
    default:
      - 8.8.8.8
      - 8.8.4.4
  ntp_servers:
    type: comma_delimited_list
    default: []
  controller_ssh_pub_key:
    type: string
  dataplane_ssh_pub_key:
    type: string
  router_external_network:
    type: string
    default: public
  floating_ip_network:
    type: string
    default: public
  net_value_specs:
    type: json
    default: {}

  controller_params:
    type: json
    default:
      image: hotstack-controller
      flavor: hotstack.small
  devstack_params:
    type: json
    default:
      image: ubuntu-noble-server
      flavor: hotstack.large
  ironic_params:
    type: json
    default:
      image: CentOS-Stream-GenericCloud-9
      cd_image: sushy-tools-blank-image
      flavor: hotstack.medium
  switch_params:
    type: json
    default:
      image: hotstack-sonic
      flavor: hotstack.small
  cdrom_disk_bus:
    type: string
    description: >
      Disk bus type for CDROM device. 'sata' may be required for older versions
      of OpenStack. Heat patch https://review.opendev.org/c/openstack/heat/+/966688
      is needed for 'sata' support.
    default: scsi
    constraints:
      - allowed_values:
          - sata
          - scsi

resources:
  #
  # Networks
  #
  machine-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  # Spine switch interconnect
  spine-link-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  # Leaf to spine links
  leaf01-spine01-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  leaf01-spine02-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  leaf02-spine01-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  leaf02-spine02-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  # Simple bridge networks for server attachments
  # These are just L2 connectivity - VLANs and configuration managed by ML2
  devstack-br-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  ironic0-br-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  ironic1-br-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  # Trunk network for leaf01 switch
  leaf01-trunk-net:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  # Shared VLAN networks for physical network connectivity
  public-vlan100:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  tenant-vlan103:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  tenant-vlan104:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  tenant-vlan105:
    type: OS::Neutron::Net
    properties:
      port_security_enabled: false
      value_specs: {get_param: net_value_specs}

  #
  # Subnets
  #
  machine-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: machine-net}
      ip_version: 4
      cidr: 192.168.32.0/24
      enable_dhcp: true
      dns_nameservers:
        - 192.168.32.254

  spine-link-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: spine-link-net}
      ip_version: 4
      cidr: 10.1.1.0/30
      enable_dhcp: false
      gateway_ip: null

  leaf01-spine01-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: leaf01-spine01-net}
      ip_version: 4
      cidr: 10.1.1.4/30
      enable_dhcp: false
      gateway_ip: null

  leaf01-spine02-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: leaf01-spine02-net}
      ip_version: 4
      cidr: 10.1.1.8/30
      enable_dhcp: false
      gateway_ip: null

  leaf02-spine01-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: leaf02-spine01-net}
      ip_version: 4
      cidr: 10.1.1.12/30
      enable_dhcp: false
      gateway_ip: null

  leaf02-spine02-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: leaf02-spine02-net}
      ip_version: 4
      cidr: 10.1.1.16/30
      enable_dhcp: false
      gateway_ip: null

  devstack-br-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: devstack-br-net}
      ip_version: 4
      cidr: 172.20.10.0/29
      enable_dhcp: false
      gateway_ip: null

  ironic0-br-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: ironic0-br-net}
      ip_version: 4
      cidr: 172.20.11.0/29
      enable_dhcp: false
      gateway_ip: null

  ironic1-br-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: ironic1-br-net}
      ip_version: 4
      cidr: 172.20.12.0/29
      enable_dhcp: false
      gateway_ip: null

  # Leaf01 trunk subnet
  leaf01-trunk-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: leaf01-trunk-net}
      ip_version: 4
      cidr: 172.20.20.0/24
      enable_dhcp: false
      gateway_ip: null

  # Shared VLAN subnets
  public-vlan100-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: public-vlan100}
      ip_version: 4
      cidr: 172.20.0.0/24
      gateway_ip: 172.20.0.1
      enable_dhcp: false

  tenant-vlan103-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: tenant-vlan103}
      ip_version: 4
      cidr: 172.20.3.0/24
      gateway_ip: null
      enable_dhcp: false

  tenant-vlan104-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: tenant-vlan104}
      ip_version: 4
      cidr: 172.20.4.0/24
      gateway_ip: null
      enable_dhcp: false

  tenant-vlan105-subnet:
    type: OS::Neutron::Subnet
    properties:
      network: {get_resource: tenant-vlan105}
      ip_version: 4
      cidr: 172.20.5.0/24
      gateway_ip: null
      enable_dhcp: false

  #
  # Routers
  #
  router:
    type: OS::Neutron::Router
    properties:
      admin_state_up: true
      external_gateway_info:
        network: {get_param: router_external_network}

  machine-net-router-interface:
    type: OS::Neutron::RouterInterface
    properties:
      router: {get_resource: router}
      subnet: {get_resource: machine-subnet}

  #
  # Controller Instance
  #
  controller_users:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        users:
          - default
          - name: zuul
            gecos: "Zuul user"
            sudo: ALL=(ALL) NOPASSWD:ALL
            ssh_authorized_keys:
              - {get_param: controller_ssh_pub_key}

  controller-write-files:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        write_files:
          - path: /etc/dnsmasq.conf
            content: |
              # dnsmasq service config
              # Include all files in /etc/dnsmasq.d except RPM backup files
              conf-dir=/etc/dnsmasq.d,.rpmnew,.rpmsave,.rpmorig
              no-resolv
            owner: root:dnsmasq
          - path: /etc/dnsmasq.d/forwarders.conf
            content:
              str_replace:
                template: |
                  # DNS forwarders records
                  server=$dns1
                  server=$dns2
                params:
                  $dns1: {get_param: [dns_servers, 0]}
                  $dns2: {get_param: [dns_servers, 1]}
            owner: root:dnsmasq
          - path: /etc/dnsmasq.d/host_records.conf
            content:
              str_replace:
                template: |
                  # Host records
                  host-record=controller-0.stack.lab,$controller0
                  host-record=spine01-host.stack.lab,$spine01_host
                  host-record=spine01.stack.lab,$spine01
                  host-record=spine02-host.stack.lab,$spine02_host
                  host-record=spine02.stack.lab,$spine02
                  host-record=leaf01-host.stack.lab,$leaf01_host
                  host-record=leaf01.stack.lab,$leaf01
                  host-record=leaf02-host.stack.lab,$leaf02_host
                  host-record=leaf02.stack.lab,$leaf02
                  host-record=devstack.stack.lab,$devstack
                params:
                  $controller0: {get_attr: [controller-machine-port, fixed_ips, 0, ip_address]}
                  $spine01_host: {get_attr: [spine01-machine-port, fixed_ips, 0, ip_address]}
                  $spine01: {get_attr: [spine01-switch-mgmt-port, fixed_ips, 0, ip_address]}
                  $spine02_host: {get_attr: [spine02-machine-port, fixed_ips, 0, ip_address]}
                  $spine02: {get_attr: [spine02-switch-mgmt-port, fixed_ips, 0, ip_address]}
                  $leaf01_host: {get_attr: [leaf01-machine-port, fixed_ips, 0, ip_address]}
                  $leaf01: {get_attr: [leaf01-switch-mgmt-port, fixed_ips, 0, ip_address]}
                  $leaf02_host: {get_attr: [leaf02-machine-port, fixed_ips, 0, ip_address]}
                  $leaf02: {get_attr: [leaf02-switch-mgmt-port, fixed_ips, 0, ip_address]}
                  $devstack: {get_attr: [devstack-machine-port, fixed_ips, 0, ip_address]}
            owner: root:dnsmasq
          - path: /etc/resolv.conf
            content: |
              nameserver: 127.0.0.1
            owner: root:root
          - path: /etc/NetworkManager/conf.d/98-rc-manager.conf
            content: |
              [main]
              rc-manager=unmanaged
            owner: root:root

  controller-runcmd:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        runcmd:
          - ['setenforce', 'permissive']
          - ['systemctl', 'enable', 'dnsmasq.service']
          - ['systemctl', 'start', 'dnsmasq.service']

  controller-init:
    type: OS::Heat::MultipartMime
    properties:
      parts:
        - config: {get_resource: controller_users}
        - config: {get_resource: controller-write-files}
        - config: {get_resource: controller-runcmd}

  controller-machine-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      mac_address: "fa:16:9e:81:f6:05"
      fixed_ips:
        - ip_address: 192.168.32.254

  controller-floating-ip:
    depends_on: machine-net-router-interface
    type: OS::Neutron::FloatingIP
    properties:
      floating_network: {get_param: floating_ip_network}
      port_id: {get_resource: controller-machine-port}

  controller:
    type: OS::Nova::Server
    properties:
      image: {get_param: [controller_params, image]}
      flavor: {get_param: [controller_params, flavor]}
      networks:
        - port: {get_resource: controller-machine-port}
      user_data_format: RAW
      user_data: {get_resource: controller-init}

  #
  # Spine Switches
  #

  # Spine01 Switch
  spine01-init:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        hostname: spine01
        fqdn: spine01.stack.lab
        users:
          - default
          - name: zuul
            gecos: "Zuul user"
            sudo: ALL=(ALL) NOPASSWD:ALL
            ssh_authorized_keys:
              - {get_param: controller_ssh_pub_key}
              - {get_param: dataplane_ssh_pub_key}
        write_files:
          - path: /etc/hotstack-sonic/config
            content: |
              MGMT_INTERFACE=eth0
              SWITCH_INTERFACE_START=eth1
              SWITCH_INTERFACE_COUNT=4
              SWITCH_HOSTNAME=spine01
              SONIC_IMAGE=localhost/docker-sonic-vs:latest
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/config_db.json
            content: {get_file: spine01-config_db.json}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/bgpd.conf
            content: {get_file: spine01-bgpd.conf}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/ospfd.conf
            content: {get_file: spine01-ospfd.conf}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/authorized_keys
            content:
              str_replace:
                template: |
                  $CONTROLLER_KEY
                  $DATAPLANE_KEY
                params:
                  $CONTROLLER_KEY: {get_param: controller_ssh_pub_key}
                  $DATAPLANE_KEY: {get_param: dataplane_ssh_pub_key}
            owner: root:root
            permissions: '0644'
        runcmd:
          - systemctl start sonic.service

  spine01-machine-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:01:01"
      fixed_ips:
        - ip_address: 192.168.32.11

  spine01-switch-mgmt-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:01:10"
      fixed_ips:
        - ip_address: 192.168.32.111

  spine01-spine-link-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: spine-link-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:01:02"

  spine01-leaf01-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: leaf01-spine01-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:01:04"

  spine01-leaf02-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: leaf02-spine01-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:01:05"

  spine01:
    type: OS::Nova::Server
    properties:
      image: {get_param: [switch_params, image]}
      flavor: {get_param: [switch_params, flavor]}
      config_drive: false
      diskConfig: MANUAL
      networks:
        - port: {get_resource: spine01-machine-port}
        - port: {get_resource: spine01-switch-mgmt-port}
        - port: {get_resource: spine01-spine-link-port}
        - port: {get_resource: spine01-leaf01-port}
        - port: {get_resource: spine01-leaf02-port}
      user_data_format: RAW
      user_data: {get_resource: spine01-init}

  # Spine02 Switch
  spine02-init:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        hostname: spine02
        fqdn: spine02.stack.lab
        users:
          - default
          - name: zuul
            gecos: "Zuul user"
            sudo: ALL=(ALL) NOPASSWD:ALL
            ssh_authorized_keys:
              - {get_param: controller_ssh_pub_key}
              - {get_param: dataplane_ssh_pub_key}
        write_files:
          - path: /etc/hotstack-sonic/config
            content: |
              MGMT_INTERFACE=eth0
              SWITCH_INTERFACE_START=eth1
              SWITCH_INTERFACE_COUNT=4
              SWITCH_HOSTNAME=spine02
              SONIC_IMAGE=localhost/docker-sonic-vs:latest
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/config_db.json
            content: {get_file: spine02-config_db.json}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/bgpd.conf
            content: {get_file: spine02-bgpd.conf}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/ospfd.conf
            content: {get_file: spine02-ospfd.conf}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/authorized_keys
            content:
              str_replace:
                template: |
                  $CONTROLLER_KEY
                  $DATAPLANE_KEY
                params:
                  $CONTROLLER_KEY: {get_param: controller_ssh_pub_key}
                  $DATAPLANE_KEY: {get_param: dataplane_ssh_pub_key}
            owner: root:root
            permissions: '0644'
        runcmd:
          - systemctl start sonic.service

  spine02-machine-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:02:01"
      fixed_ips:
        - ip_address: 192.168.32.12

  spine02-switch-mgmt-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:02:10"
      fixed_ips:
        - ip_address: 192.168.32.112

  spine02-spine-link-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: spine-link-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:02:02"

  spine02-leaf01-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: leaf01-spine02-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:02:04"

  spine02-leaf02-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: leaf02-spine02-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:02:05"

  spine02:
    type: OS::Nova::Server
    properties:
      image: {get_param: [switch_params, image]}
      flavor: {get_param: [switch_params, flavor]}
      config_drive: false
      diskConfig: MANUAL
      networks:
        - port: {get_resource: spine02-machine-port}
        - port: {get_resource: spine02-switch-mgmt-port}
        - port: {get_resource: spine02-spine-link-port}
        - port: {get_resource: spine02-leaf01-port}
        - port: {get_resource: spine02-leaf02-port}
      user_data_format: RAW
      user_data: {get_resource: spine02-init}

  #
  # Leaf Switches
  #

  # Leaf01 Switch
  leaf01-init:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        hostname: leaf01
        fqdn: leaf01.stack.lab
        users:
          - default
          - name: zuul
            gecos: "Zuul user"
            sudo: ALL=(ALL) NOPASSWD:ALL
            ssh_authorized_keys:
              - {get_param: controller_ssh_pub_key}
              - {get_param: dataplane_ssh_pub_key}
        write_files:
          - path: /etc/hotstack-sonic/config
            content: |
              MGMT_INTERFACE=eth0
              SWITCH_INTERFACE_START=eth1
              SWITCH_INTERFACE_COUNT=5
              SWITCH_HOSTNAME=leaf01
              SONIC_IMAGE=localhost/docker-sonic-vs:latest
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/config_db.json
            content: {get_file: leaf01-config_db.json}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/bgpd.conf
            content: {get_file: leaf01-bgpd.conf}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/ospfd.conf
            content: {get_file: leaf01-ospfd.conf}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/authorized_keys
            content:
              str_replace:
                template: |
                  $CONTROLLER_KEY
                  $DATAPLANE_KEY
                params:
                  $CONTROLLER_KEY: {get_param: controller_ssh_pub_key}
                  $DATAPLANE_KEY: {get_param: dataplane_ssh_pub_key}
            owner: root:root
            permissions: '0644'
        runcmd:
          - systemctl start sonic.service

  leaf01-machine-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:03:01"
      fixed_ips:
        - ip_address: 192.168.32.13

  leaf01-switch-mgmt-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:03:10"
      fixed_ips:
        - ip_address: 192.168.32.113

  leaf01-spine01-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: leaf01-spine01-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:03:02"

  leaf01-spine02-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: leaf01-spine02-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:03:04"

  leaf01-devstack-br-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: devstack-br-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:03:06"

  leaf01-trunk-parent-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: leaf01-trunk-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:03:05"

  leaf01-trunk-public-vlan100-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: public-vlan100}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:03:07"

  leaf01-trunk-tenant-vlan103-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: tenant-vlan103}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:03:08"

  leaf01-trunk-tenant-vlan104-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: tenant-vlan104}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:03:09"

  leaf01-trunk-tenant-vlan105-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: tenant-vlan105}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:03:0a"

  leaf01-trunk:
    type: OS::Neutron::Trunk
    properties:
      port: {get_resource: leaf01-trunk-parent-port}
      sub_ports:
        - port: {get_resource: leaf01-trunk-public-vlan100-port}
          segmentation_id: 100
          segmentation_type: vlan
        - port: {get_resource: leaf01-trunk-tenant-vlan103-port}
          segmentation_id: 103
          segmentation_type: vlan
        - port: {get_resource: leaf01-trunk-tenant-vlan104-port}
          segmentation_id: 104
          segmentation_type: vlan
        - port: {get_resource: leaf01-trunk-tenant-vlan105-port}
          segmentation_id: 105
          segmentation_type: vlan

  leaf02-ironic0-br-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: ironic0-br-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:04:05"

  leaf01:
    type: OS::Nova::Server
    depends_on: leaf01-trunk
    properties:
      image: {get_param: [switch_params, image]}
      flavor: {get_param: [switch_params, flavor]}
      config_drive: false
      diskConfig: MANUAL
      networks:
        - port: {get_resource: leaf01-machine-port}
        - port: {get_resource: leaf01-switch-mgmt-port}
        - port: {get_resource: leaf01-spine01-port}
        - port: {get_resource: leaf01-spine02-port}
        - port: {get_attr: [leaf01-trunk, port_id]}
        - port: {get_resource: leaf01-devstack-br-port}
      user_data_format: RAW
      user_data: {get_resource: leaf01-init}

  # Leaf02 Switch
  leaf02-init:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        hostname: leaf02
        fqdn: leaf02.stack.lab
        users:
          - default
          - name: zuul
            gecos: "Zuul user"
            sudo: ALL=(ALL) NOPASSWD:ALL
            ssh_authorized_keys:
              - {get_param: controller_ssh_pub_key}
              - {get_param: dataplane_ssh_pub_key}
        write_files:
          - path: /etc/hotstack-sonic/config
            content: |
              MGMT_INTERFACE=eth0
              SWITCH_INTERFACE_START=eth1
              SWITCH_INTERFACE_COUNT=5
              SWITCH_HOSTNAME=leaf02
              SONIC_IMAGE=localhost/docker-sonic-vs:latest
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/config_db.json
            content: {get_file: leaf02-config_db.json}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/bgpd.conf
            content: {get_file: leaf02-bgpd.conf}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/ospfd.conf
            content: {get_file: leaf02-ospfd.conf}
            owner: root:root
            permissions: '0644'
          - path: /etc/hotstack-sonic/authorized_keys
            content:
              str_replace:
                template: |
                  $CONTROLLER_KEY
                  $DATAPLANE_KEY
                params:
                  $CONTROLLER_KEY: {get_param: controller_ssh_pub_key}
                  $DATAPLANE_KEY: {get_param: dataplane_ssh_pub_key}
            owner: root:root
            permissions: '0644'
        runcmd:
          - systemctl start sonic.service

  leaf02-machine-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:04:01"
      fixed_ips:
        - ip_address: 192.168.32.14

  leaf02-switch-mgmt-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:04:10"
      fixed_ips:
        - ip_address: 192.168.32.114

  leaf02-spine01-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: leaf02-spine01-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:04:02"

  leaf02-spine02-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: leaf02-spine02-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:04:04"

  leaf02-ironic1-br-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: ironic1-br-net}
      port_security_enabled: false
      mac_address: "22:57:f8:dd:04:06"

  leaf02:
    type: OS::Nova::Server
    properties:
      image: {get_param: [switch_params, image]}
      flavor: {get_param: [switch_params, flavor]}
      config_drive: false
      diskConfig: MANUAL
      networks:
        - port: {get_resource: leaf02-machine-port}
        - port: {get_resource: leaf02-switch-mgmt-port}
        - port: {get_resource: leaf02-spine01-port}
        - port: {get_resource: leaf02-spine02-port}
        - port: {get_resource: leaf02-ironic0-br-port}
        - port: {get_resource: leaf02-ironic1-br-port}
      user_data_format: RAW
      user_data: {get_resource: leaf02-init}

  #
  # Devstack Instance
  #
  devstack_users:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        users:
          - default
          - name: stack
            gecos: "Stack user"
            sudo: ALL=(ALL) NOPASSWD:ALL
            homedir: /opt/stack
            shell: /bin/bash
            ssh_authorized_keys:
              - {get_param: controller_ssh_pub_key}
              - {get_param: dataplane_ssh_pub_key}

  devstack-network-config:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        hostname: devstack
        fqdn: devstack.stack.lab


  devstack-write-files:
    type: OS::Heat::CloudConfig
    properties:
      cloud_config:
        write_files:
          - path: /etc/hotstack/local.conf.j2
            content:
              get_file: local.conf.j2
            owner: root:root
            permissions: '0644'
          - path: /etc/neutron/l2vni_network_nodes.yaml
            content:
              get_file: l2vni_network_nodes.yaml
            owner: root:root
            permissions: '0644'

  devstack-init:
    type: OS::Heat::MultipartMime
    properties:
      parts:
        - config: {get_resource: devstack_users}
        - config: {get_resource: devstack-network-config}
        - config: {get_resource: devstack-write-files}

  devstack-machine-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: machine-net}
      port_security_enabled: false
      mac_address: "fa:16:9e:81:f6:20"
      fixed_ips:
        - ip_address: 192.168.32.20

  devstack-trunk-parent-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: devstack-br-net}
      port_security_enabled: false
      mac_address: "fa:16:9e:81:f6:21"

  devstack-public-vlan100-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: public-vlan100}
      port_security_enabled: false

  devstack-tenant-vlan103-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: tenant-vlan103}
      port_security_enabled: false

  devstack-tenant-vlan104-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: tenant-vlan104}
      port_security_enabled: false

  devstack-tenant-vlan105-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: tenant-vlan105}
      port_security_enabled: false

  devstack-trunk:
    type: OS::Neutron::Trunk
    properties:
      port: {get_resource: devstack-trunk-parent-port}
      sub_ports:
        - port: {get_resource: devstack-public-vlan100-port}
          segmentation_id: 100
          segmentation_type: vlan
        - port: {get_resource: devstack-tenant-vlan103-port}
          segmentation_id: 103
          segmentation_type: vlan
        - port: {get_resource: devstack-tenant-vlan104-port}
          segmentation_id: 104
          segmentation_type: vlan
        - port: {get_resource: devstack-tenant-vlan105-port}
          segmentation_id: 105
          segmentation_type: vlan

  devstack:
    type: OS::Nova::Server
    depends_on: devstack-trunk
    properties:
      image: {get_param: [devstack_params, image]}
      flavor: {get_param: [devstack_params, flavor]}
      networks:
        - port: {get_resource: devstack-machine-port}
        - port: {get_attr: [devstack-trunk, port_id]}
      user_data_format: RAW
      user_data: {get_resource: devstack-init}

  #
  # Ironic Nodes
  #
  ironic0-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: ironic0-br-net}
      port_security_enabled: false

  ironic0:
    type: OS::Nova::Server
    properties:
      flavor: {get_param: [ironic_params, flavor]}
      block_device_mapping_v2:
        - device_type: disk
          boot_index: 1
          image_id: {get_param: [ironic_params, image]}
          volume_size: 40
          delete_on_termination: true
        - device_type: cdrom
          disk_bus: {get_param: cdrom_disk_bus}
          boot_index: 0
          image_id: {get_param: [ironic_params, cd_image]}
          volume_size: 5
          delete_on_termination: true
      networks:
        - port: {get_resource: ironic0-port}

  ironic1-port:
    type: OS::Neutron::Port
    properties:
      network: {get_resource: ironic1-br-net}
      port_security_enabled: false

  ironic1:
    type: OS::Nova::Server
    properties:
      flavor: {get_param: [ironic_params, flavor]}
      block_device_mapping_v2:
        - device_type: disk
          boot_index: 1
          image_id: {get_param: [ironic_params, image]}
          volume_size: 40
          delete_on_termination: true
        - device_type: cdrom
          disk_bus: {get_param: cdrom_disk_bus}
          boot_index: 0
          image_id: {get_param: [ironic_params, cd_image]}
          volume_size: 5
          delete_on_termination: true
      networks:
        - port: {get_resource: ironic1-port}

outputs:
  controller_floating_ip:
    description: Controller Floating IP
    value: {get_attr: [controller-floating-ip, floating_ip_address]}

  controller_ansible_host:
    description: >
      Controller ansible host, this struct can be passed to the ansible.builtin.add_host module
    value:
      name: controller-0
      ansible_ssh_user: zuul
      ansible_host: {get_attr: [controller-floating-ip, floating_ip_address]}
      ansible_port: 22
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
      groups: controllers

  devstack_ansible_host:
    description: >
      Devstack ansible host, this struct can be passed to the ansible.builtin.add_host module.
      Uses ProxyJump through the controller for SSH access.
    value:
      name: devstack
      ansible_user: stack
      ansible_host: {get_attr: [devstack-machine-port, fixed_ips, 0, ip_address]}
      ansible_port: 22
      ansible_ssh_common_args:
        str_replace:
          template: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=zuul@$controller_ip'
          params:
            $controller_ip: {get_attr: [controller-floating-ip, floating_ip_address]}
      ansible_ssh_private_key_file: '~/.ssh/id_rsa'
      groups: devstack_nodes

  devstack_netplan_config:
    description: >
      Complete netplan configuration for devstack node to be written by Ansible
    value:
      network:
        version: 2
        ethernets:
          enp3s0:
            match:
              macaddress: "fa:16:9e:81:f6:20"
            dhcp4: true
            set-name: "enp3s0"
            mtu: 1442
          trunk0:
            match:
              macaddress: "fa:16:9e:81:f6:21"
            dhcp4: false
            dhcp6: false
            set-name: trunk0
            mtu: 1442

  sushy_emulator_uuids:
    description: UUIDs of instances to manage with sushy-tools - RedFish virtual BMC
    value:
      ironic0: {get_resource: ironic0}
      ironic1: {get_resource: ironic1}

  sushy_tools_vmedia_type:
    description: Virtual media implementation type for sushy-tools (rescue or volumeRebuild)
    value: rescue

  ironic_nodes:
    description: Ironic nodes YAML, used with openstack baremetal create to enroll nodes in Openstack Ironic
    value:
      nodes:
        - name: ironic0
          driver: redfish
          bios_interface: no-bios
          boot_interface: redfish-virtual-media
          network_interface: neutron
          driver_info:
            redfish_address: http://controller-0.stack.lab:8000
            redfish_system_id:
              str_replace:
                template: "/redfish/v1/Systems/$SYS_ID"
                params:
                  $SYS_ID: {get_resource: ironic0}
            redfish_username: admin
            redfish_password: password
          properties:
            cpu_arch: x86_64
            cpus: 1
            memory_mb: 1024
            local_gb: 15
            capabilities: boot_mode:uefi
          ports:
            - address: {get_attr: [ironic0-port, mac_address]}
              physical_network: public
              local_link_connection:
                switch_id: "22:57:f8:dd:04:10"
                switch_info: leaf02
                port_id: "Ethernet8"
        - name: ironic1
          driver: redfish
          bios_interface: no-bios
          boot_interface: redfish-virtual-media
          network_interface: neutron
          driver_info:
            redfish_address: http://controller-0.stack.lab:8000
            redfish_system_id:
              str_replace:
                template: "/redfish/v1/Systems/$SYS_ID"
                params:
                  $SYS_ID: {get_resource: ironic1}
            redfish_username: admin
            redfish_password: password
          properties:
            cpu_arch: x86_64
            cpus: 1
            memory_mb: 1024
            local_gb: 15
            capabilities: boot_mode:uefi
          ports:
            - address: {get_attr: [ironic1-port, mac_address]}
              physical_network: public
              local_link_connection:
                switch_id: "22:57:f8:dd:04:10"
                switch_info: leaf02
                port_id: "Ethernet12"

  ansible_inventory:
    description: Ansible inventory
    value:
      all:
        children:
          controllers:
            vars:
          switches:
            vars:
          devstack_nodes:
            vars:
      localhosts:
        hosts:
          localhost:
            ansible_connection: local
      controllers:
        hosts:
          controller0:
            ansible_host: {get_attr: [controller-machine-port, fixed_ips, 0, ip_address]}
            ansible_user: zuul
            ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            ansible_ssh_private_key_file: '~/.ssh/id_rsa'
      switches:
        hosts:
          spine01:
            ansible_host: {get_attr: [spine01-machine-port, fixed_ips, 0, ip_address]}
            ansible_user: admin
            ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            ansible_ssh_private_key_file: '~/.ssh/id_rsa'
          spine02:
            ansible_host: {get_attr: [spine02-machine-port, fixed_ips, 0, ip_address]}
            ansible_user: admin
            ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            ansible_ssh_private_key_file: '~/.ssh/id_rsa'
          leaf01:
            ansible_host: {get_attr: [leaf01-machine-port, fixed_ips, 0, ip_address]}
            ansible_user: admin
            ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            ansible_ssh_private_key_file: '~/.ssh/id_rsa'
          leaf02:
            ansible_host: {get_attr: [leaf02-machine-port, fixed_ips, 0, ip_address]}
            ansible_user: admin
            ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            ansible_ssh_private_key_file: '~/.ssh/id_rsa'
      devstack_nodes:
        hosts:
          devstack:
            ansible_host: {get_attr: [devstack-machine-port, fixed_ips, 0, ip_address]}
            ansible_user: stack
            ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            ansible_ssh_private_key_file: '~/.ssh/id_rsa'
