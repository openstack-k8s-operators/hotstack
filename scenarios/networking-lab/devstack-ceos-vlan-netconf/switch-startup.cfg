hostname switch.stack.lab
username admin privilege 15 secret admin
vrf instance MGMT
ip routing vrf MGMT
ip name-server vrf MGMT 192.168.32.254
ip route vrf MGMT 0.0.0.0/0 192.168.32.1

interface Management0
   description Management interface
   vrf MGMT
   ip address 192.168.32.111/24

interface Ethernet1
   description Trunk port to devstack - managed by ML2
   switchport mode trunk
   switchport trunk allowed vlan none
   mtu 1500
   spanning-tree portfast

interface Ethernet2
   description Ironic node 0 - managed by ML2
   switchport mode access
   mtu 1500
   spanning-tree portfast

interface Ethernet3
   description Ironic node 1 - managed by ML2
   switchport mode access
   mtu 1500
   spanning-tree portfast

vlan 100
   name provisioning

vlan 103
   name tenant-vlan-103

vlan 104
   name tenant-vlan-104

vlan 105
   name tenant-vlan-105

management api http-commands
   no shutdown
   vrf MGMT
      no shutdown

management api gnmi
   transport grpc default
      vrf MGMT

management api netconf
   transport ssh default
      vrf MGMT

management ssh
   vrf MGMT
      no shutdown

end
