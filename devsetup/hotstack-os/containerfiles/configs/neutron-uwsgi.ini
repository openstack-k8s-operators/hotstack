[uwsgi]
# HTTP mode - listen directly on port 9696
http = 0.0.0.0:9696

# WSGI application - use Neutron's main_api_uwsgi entry point
module = neutron.cmd.server:main_api_uwsgi()

# Process configuration
processes = 1
threads = 4
master = true
enable-threads = true
lazy-apps = true
start-time = %t

# Logging
log-date = true
py-tracebacks = true

# Graceful shutdown
die-on-term = true

# Performance tuning
thunder-lock = true
buffer-size = 65535

# Disable request logging (Neutron logs via oslo.log)
disable-logging = false
log-5xx = true
log-4xx = true

# Error handling
catch-exceptions = true
need-app = true
