# HotStack-OS libvirt session configuration
# This configuration allows the Nova container (running as root) to connect
# to the hotstack user's libvirt session socket for isolated VM management.

# Unix socket permissions (0770 allows owner and kvm group access)
# Root in Nova container can connect because it's added to kvm group
unix_sock_group = "kvm"
unix_sock_ro_perms = "0770"
unix_sock_rw_perms = "0770"
unix_sock_admin_perms = "0770"

# Keep daemon running (don't auto-shutdown)
keepalive_interval = 5
keepalive_count = 5
