# Supervisord configuration for SSH daemon
[program:sshd]
command=/bin/bash -c "mkdir -p /run/sshd && /usr/sbin/sshd -D"
priority=3
autostart=true
autorestart=true
stdout_logfile=syslog
stderr_logfile=syslog
