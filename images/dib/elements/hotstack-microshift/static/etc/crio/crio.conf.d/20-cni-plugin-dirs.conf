# Override CRI-O CNI plugin directories and default network for Multus compatibility
# This allows CNI plugins to be installed in the standard Kubernetes location (/opt/cni/bin)
# while maintaining compatibility with MicroShift's default (/run/cni/bin)
#
# This configuration file is processed after 10-microshift.conf and 11-microshift-ovn.conf
# and overrides both the plugin_dirs and cni_default_network settings.
#
# The cni_default_network is set to "multus-cni-network" to use Multus CNI instead of
# the direct ovn-kubernetes plugin. This allows pods to have multiple network interfaces
# via NetworkAttachmentDefinitions.

[crio.network]
plugin_dirs = [
        "/run/cni/bin",
        "/opt/cni/bin"
]
cni_default_network = "multus-cni-network"
