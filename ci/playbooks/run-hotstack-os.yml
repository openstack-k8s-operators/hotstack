---
- name: Test hotstack-os containerized OpenStack devsetup
  hosts: all
  vars:
    hotstack_os_dir: "{{ ansible_user_dir }}/{{ zuul.project.src_dir }}/devsetup/hotstack-os"
  tasks:

    - name: Install EPEL repository
      become: true
      ansible.builtin.dnf:
        name: epel-release
        state: present

    - name: Install essential packages for build
      become: true
      ansible.builtin.dnf:
        name:
          - podman
          - make
          - apt-cacher-ng
        state: present

    - name: Start and enable apt-cacher-ng service
      become: true
      ansible.builtin.systemd:
        name: apt-cacher-ng
        state: started
        enabled: true

    - name: Generate SSH keypair for smoke test
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -f {{ ansible_user_dir }}/.ssh/id_ed25519 -N "" -C "zuul@ci"
        creates: "{{ ansible_user_dir }}/.ssh/id_ed25519.pub"

    - name: Create log directory
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/zuul-output/logs"
        state: directory
        mode: '0755'

    - name: Copy .env.example to .env if not exists
      ansible.builtin.copy:
        src: "{{ hotstack_os_dir }}/.env.example"
        dest: "{{ hotstack_os_dir }}/.env"
        remote_src: true
        force: false
        mode: '0644'

    - name: Configure APT_PROXY for CI build
      ansible.builtin.lineinfile:
        path: "{{ hotstack_os_dir }}/.env"
        regexp: '^APT_PROXY='
        line: 'APT_PROXY=http://host.containers.internal:3142'

    - name: Configure BUILD_PARALLEL for CI build
      ansible.builtin.lineinfile:
        path: "{{ hotstack_os_dir }}/.env"
        regexp: '^BUILD_PARALLEL='
        line: 'BUILD_PARALLEL=10'

    - name: Install dependencies (includes libvirt for isolation test)
      become: true
      args:
        chdir: "{{ hotstack_os_dir }}"
        executable: /bin/bash
      ansible.builtin.shell: |
        set -o pipefail
        make install-deps 2>&1 | tee {{ ansible_user_dir }}/zuul-output/logs/make_install-deps.log

    - name: Create test VM in system libvirt to verify isolation
      become: true
      block:
        - name: Create minimal test VM XML definition
          ansible.builtin.copy:
            dest: /tmp/test-vm.xml
            content: |
              <domain type='kvm'>
                <name>ci-test-isolation-vm</name>
                <memory unit='KiB'>131072</memory>
                <vcpu placement='static'>1</vcpu>
                <os>
                  <type arch='x86_64'>hvm</type>
                </os>
                <devices>
                  <emulator>/usr/libexec/qemu-kvm</emulator>
                </devices>
              </domain>
            mode: '0644'

        - name: Define test VM in system libvirt
          ansible.builtin.command:
            cmd: virsh define /tmp/test-vm.xml
          changed_when: true

        - name: Verify test VM exists in system libvirt
          ansible.builtin.command:
            cmd: virsh list --all --name
          register: system_vms
          changed_when: false

        - name: Verify ci-test-isolation-vm is present
          ansible.builtin.assert:
            that:
              - "'ci-test-isolation-vm' in system_vms.stdout"
            fail_msg: "Test VM not found in system libvirt"
            success_msg: "Test VM successfully created in system libvirt"

    - name: Build, setup, and start hotstack-os services
      become: true
      block:
        - name: Test apt-cacher-ng connectivity from container context
          ansible.builtin.command:
            cmd: >-
              podman run --rm docker.io/curlimages/curl:latest
              curl -f -s -o /dev/null -w "%{http_code}"
              http://host.containers.internal:3142/acng-report.html
          register: container_proxy_test
          changed_when: false
          retries: 10
          delay: 10
          until: container_proxy_test.stdout == "200"

        - name: Display container proxy test result
          ansible.builtin.debug:
            msg: "{{ container_proxy_test.stdout }}"

        - name: Build container images (with retry logic)
          args:
            chdir: "{{ hotstack_os_dir }}"
            executable: /bin/bash
          ansible.builtin.shell: |
            set -o pipefail

            # Try up to 3 times with conditional cleanup
            for attempt in 1 2 3; do
              echo "=== Build attempt $attempt of 3 ==="

              if make build VERBOSE=1 2>&1 | tee {{ ansible_user_dir }}/zuul-output/logs/make_build_attempt_${attempt}.log; then
                echo "=== Build succeeded on attempt $attempt ==="
                exit 0
              fi

              echo "=== Build attempt $attempt failed ==="

              # Check if failure was due to apt/network issues
              log_file="{{ ansible_user_dir }}/zuul-output/logs/make_build_attempt_${attempt}.log"
              if grep -qE "Failed to fetch.*\.deb|DlMaxRetries|Download Expired|Connection closed" "$log_file"; then
                echo "=== Network/proxy issue detected, keeping build cache ==="
              else
                echo "=== Non-network issue, cleaning up buildah state ==="
                buildah rm --all 2>&1 | tee -a {{ ansible_user_dir }}/zuul-output/logs/buildah_cleanup_attempt_${attempt}.log || true
                buildah rmi --all 2>&1 | tee -a {{ ansible_user_dir }}/zuul-output/logs/buildah_cleanup_attempt_${attempt}.log || true
                buildah prune --all 2>&1 | tee -a {{ ansible_user_dir }}/zuul-output/logs/buildah_cleanup_attempt_${attempt}.log || true
              fi

              # Random delay between 30-60 seconds
              delay=$((30 + RANDOM % 31))
              echo "=== Waiting ${delay} seconds ==="
              sleep $delay
            done

            echo "=== All 3 build attempts failed ==="
            exit 1
          register: build_result

        - name: Install OpenStack client packages
          args:
            chdir: "{{ hotstack_os_dir }}"
            executable: /bin/bash
          ansible.builtin.shell: |
            set -o pipefail
            make install-client 2>&1 | tee {{ ansible_user_dir }}/zuul-output/logs/make_install-client.log

        - name: Install and start systemd services
          args:
            chdir: "{{ hotstack_os_dir }}"
            executable: /bin/bash
          ansible.builtin.shell: |
            set -o pipefail
            make install 2>&1 | tee {{ ansible_user_dir }}/zuul-output/logs/make_install.log

        - name: Enable and start systemd services
          ansible.builtin.systemd:
            name: hotstack-os.target
            state: started
            enabled: true

        - name: Wait for all hotstack-os services to be active
          ansible.builtin.command:
            cmd: systemctl is-active hotstack-os.target
          register: target_status
          until: target_status.rc == 0
          retries: 60
          delay: 5
          changed_when: false

    - name: Run post-setup to create project and upload images
      args:
        chdir: "{{ hotstack_os_dir }}"
        executable: /bin/bash
      environment:
        HOTSTACK_NO_PROGRESS: "1"
      ansible.builtin.shell: |
        set -o pipefail
        make post-setup 2>&1 | tee {{ ansible_user_dir }}/zuul-output/logs/make_post-setup.log

    - name: Run smoke test
      args:
        chdir: "{{ hotstack_os_dir }}"
        executable: /bin/bash
      ansible.builtin.shell: |
        set -o pipefail
        make smoke-test 2>&1 | tee {{ ansible_user_dir }}/zuul-output/logs/make_smoke-test.log

    # Smoke test passing proves isolation works - Nova would have failed
    # with InvalidConfiguration error if it saw the system VM

    - name: Get hotstack user UID for restart tests
      become: true
      ansible.builtin.command:
        cmd: id -u hotstack
      register: hotstack_uid
      changed_when: false

    - name: Test service restart - Stop HotsTac(k)os services
      become: true
      ansible.builtin.systemd:
        name: hotstack-os.target
        state: stopped

    # Wait for services to fully stop. All services have TimeoutStopSec=30,
    # so we wait 60 seconds to account for the 30s graceful shutdown timeout
    # plus additional buffer for cleanup and multiple services stopping.
    - name: Wait for services to fully stop
      ansible.builtin.pause:
        seconds: 60

    - name: Verify libvirt session still running after service stop
      become: true
      become_user: hotstack
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ hotstack_uid.stdout }}"
      ansible.builtin.command:
        cmd: systemctl --user is-active hotstack-os-libvirtd-session.service
      register: libvirt_session_status
      changed_when: false
      failed_when: false

    - name: Verify libvirt session persistence
      ansible.builtin.assert:
        that:
          - libvirt_session_status.stdout == "active"
        fail_msg: "Libvirt session stopped - should remain running"
        success_msg: "✓ Libvirt session persisted across service stop"

    - name: Test service restart - Start HotsTac(k)os services
      become: true
      ansible.builtin.systemd:
        name: hotstack-os.target
        state: started

    - name: Wait for all hotstack-os services to be active after restart
      become: true
      ansible.builtin.command:
        cmd: systemctl is-active hotstack-os.target
      register: target_status
      until: target_status.rc == 0
      retries: 60
      delay: 5
      changed_when: false

    - name: Run smoke test after restart
      args:
        chdir: "{{ hotstack_os_dir }}"
        executable: /bin/bash
      ansible.builtin.shell: |
        set -o pipefail
        make smoke-test 2>&1 | tee {{ ansible_user_dir }}/zuul-output/logs/make_smoke-test-after-restart.log
